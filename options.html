<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>WebSurf Helper Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 16px;
      min-width: 360px;
      color: #222;
    }
    h2 { margin: 0 0 12px; font-size: 16px; }
    h3 { margin: 16px 0 8px; font-size: 13px; color: #555; }
    .row { margin-bottom: 10px; }
    label { display: inline-flex; align-items: center; gap: 6px; }
    input[type="number"] { width: 80px; }
    input:disabled { color: #999; background: #f5f5f5; }
    .hint { color: #777; font-size: 12px; margin-top: 4px; }
    .status { color: #2a7; font-size: 12px; height: 16px; margin-top: 8px; }
    hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }
  </style>
</head>
<body>
  <h2>WebSurf Helper</h2>

  <h3>リンクのダブルクリック</h3>
  <div class="row">
    <label><input type="checkbox" id="enableDblClick"> 機能を有効にする</label>
  </div>
  <div class="row">
    <label><input type="checkbox" id="openInForeground"> 新しいタブをすぐに表示する（OFF: バックグラウンド）</label>
  </div>
  <div class="row">
    <label>ダブルクリック判定時間：
      <input type="number" id="dblClickDelay" min="50" max="800" step="10"> ms
    </label>
    <div class="hint">
      この時間内に 2 回目のクリックが来たらダブルクリックと判定する。<br>
      短いほどシングルクリック反応は速くなるが、ダブルクリックを取りこぼしやすくなる（推奨 200〜300ms）。
    </div>
  </div>

  <hr>

  <h3>上下キーのスクロール</h3>
  <div class="row">
    <label><input type="checkbox" id="enableScroll"> 機能を有効にする</label>
  </div>
  <div class="row">
    <label>スクロール量（ビューポート比）：
      <input type="number" id="scrollRatio" min="0.1" max="1.0" step="0.05">
    </label>
    <div class="hint">0.5 で画面の半分。0.1 〜 1.0 の範囲で指定できる。</div>
  </div>

  <hr>

  <h3>新しいタブのURL</h3>
  <div class="row">
    <label><input type="checkbox" id="enableNewTabUrl"> 機能を有効にする</label>
  </div>
  <div class="row">
    <div style="margin-bottom: 4px;">開くURL：</div>
    <input type="url" id="newTabUrl" style="width: 100%; box-sizing: border-box;" placeholder="https://www.google.com/search?udm=50">
    <div class="hint">
      新しいタブを開いたときに、このURLを表示する。<br>
      既定はGoogle検索のAIモード。OFFにすると通常のGoogle検索が開く。
    </div>
  </div>

  <div id="status" class="status"></div>
  <script src="options.js"></script>
</body>
</html>
